id: sqli-error-based
info:
  name: Error Based SQL Injection
  severity: high
request:
  method: GET
  path: "?id={{payload}}"
payloads:
  - "'"
  - "''"
  - "`"
  - "``"
  - ",\"\""
matchers:
  type: word
  words:
    - "SQL syntax"
    - "mysql_fetch_array()"
    - "ORA-01756"
    - "PostgreSQL"
    - "sqlite3_query"
